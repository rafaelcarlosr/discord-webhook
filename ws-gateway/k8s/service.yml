apiVersion: v1
kind: Service
metadata:
  name: ws-gateway
  namespace: discord
  labels:
    app: ws-gateway
spec:
  # ClusterIP only — no external traffic needed; this process connects outbound to Discord.
  type: ClusterIP
  selector:
    app: ws-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
