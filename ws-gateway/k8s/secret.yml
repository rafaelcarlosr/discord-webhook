apiVersion: v1
kind: Secret
metadata:
  name: discord-ws-gateway-secret
  namespace: discord
type: Opaque
stringData:
  # Bot token from the Discord Developer Portal (include the "Bot " prefix)
  bot-token: "Bot REPLACE_ME"
  # Gateway Intents bitmask — e.g. 513 = GUILDS (1) + GUILD_MESSAGES (512)
  intents: "513"
