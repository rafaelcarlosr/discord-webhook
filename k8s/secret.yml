# Create with:
#   kubectl -n discord create secret generic interaction-gateway \
#     --from-literal=DISCORD_PUBLIC_KEY=<your-hex-key> \
#     --from-literal=REDIS_PASSWORD=<your-redis-password>
#
# Or apply this manifest after base64-encoding the values:
#   echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: interaction-gateway
  namespace: discord
type: Opaque
data:
  DISCORD_PUBLIC_KEY: REPLACE_WITH_BASE64
  REDIS_PASSWORD: REPLACE_WITH_BASE64
