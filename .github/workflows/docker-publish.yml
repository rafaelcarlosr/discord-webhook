name: Build & publish Docker image

on:
  push:
    branches: [main, master]
    tags:    ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build native image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds (optional — remove if amd64-only is fine)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags:
      #  • PRs              → no push, just build + cache
      #  • push to main     → ghcr.io/owner/repo:latest  + ghcr.io/owner/repo:sha-<short>
      #  • push tag v1.2.3  → ghcr.io/owner/repo:1.2.3   + ghcr.io/owner/repo:latest
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Native image build is memory-intensive; limit is set here as a label/comment.
          # The runner must have enough RAM (≥8 GB). GitHub-hosted ubuntu-latest = 7 GB;
          # use a self-hosted runner or upgrade to ubuntu-latest-16-cores for production.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache — reuse across runs
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Platforms — native image must match target OS/arch.
          # Remove linux/arm64 if you don't need ARM deployments.
          platforms: linux/amd64
