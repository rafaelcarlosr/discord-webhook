name: Build & publish Docker image

on:
  push:
    branches: [main, master]
    tags:    ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ---------------------------------------------------------------
# Job 1 — JVM image
# Runs on every PR and every push to main/master.
# Uses the default Dockerfile target (eclipse-temurin:25-jre).
# Standard ubuntu-latest runner (7 GB RAM) is fine for this.
# ---------------------------------------------------------------
jobs:
  build-jvm:
    name: Build JVM image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-jvm,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push JVM image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: jvm
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=jvm
          cache-to:   type=gha,scope=jvm,mode=max
          platforms: linux/amd64,linux/arm64

# ---------------------------------------------------------------
# Job 2 — GraalVM native image
# Runs ONLY on version tags (v*).
# Needs ~8 GB RAM — uses ubuntu-latest-8-cores (16 GB).
# Produces a separate image tagged with the -native suffix.
# ---------------------------------------------------------------
  build-native:
    name: Build native image
    # Only run on release tags; skip for PRs and branch pushes.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest-8-cores   # 16 GB RAM — safe for native-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-native,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest-native

      - name: Build and push native image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=native
          cache-to:   type=gha,scope=native,mode=max
          # Native image is OS+arch-specific; amd64 matches GKE default nodes.
          # Add linux/arm64 only if you have ARM GKE node pools.
          platforms: linux/amd64
